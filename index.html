<!DOCTYPE html>
<html lang="fa">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Core Project</title>
    <style>
        * {
            box-sizing: border-box;
            user-select: none;
            -webkit-user-select: none;
        }
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #05070b;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
        }
        .container {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            z-index: 2;
            pointer-events: none;
        }
        .main-number {
            font-size: 120px;
            font-weight: bold;
            color: rgba(255, 255, 255, 0.45);
            letter-spacing: 10px;
            text-shadow: 0 0 20px rgba(255, 255, 255, 0.2);
            transition: color 0.5s ease, text-shadow 0.5s ease;
        }
        .main-number.complete {
            color: rgba(255, 255, 255, 0.95);
            text-shadow: 0 0 35px rgba(255, 255, 255, 0.8);
        }
    </style>
</head>
<body>

    <canvas id="spaceCanvas"></canvas>

    <div class="container">
        <div class="main-number" id="center11">11</div>
    </div>

    <audio id="bgMusic" src="music.mp3" preload="auto"></audio>

    <script>
        const canvas = document.getElementById('spaceCanvas');
        const ctx = canvas.getContext('2d');
        const center11 = document.getElementById('center11');
        const bgMusic = document.getElementById('bgMusic');

        let width = canvas.width = window.innerWidth;
        let height = canvas.height = window.innerHeight;

        window.addEventListener('resize', () => {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
            generate11Pattern();
        });

        const mouse = { x: null, y: null, active: false, radius: 130 };
        const particleCount = 850; // تعداد بهینه ذرات برای داشتن بالاترین سرعت و تراکم عالی
        const particles = [];
        
        let isTimeFor11 = false;
        const startTime = Date.now();
        const targets11 = [];

        function generate11Pattern() {
            targets11.length = 0;
            const cx = width / 2;
            const cy = height / 2;
            const scale = Math.min(width, height) * 0.5; 

            for (let i = 0; i < particleCount; i++) {
                let tx = cx;
                let ty = cy;
                
                if (i < particleCount / 2) {
                    let p = i / (particleCount / 2);
                    tx = cx - (scale * 0.18);
                    ty = cy - (scale * 0.4) + (p * scale * 0.8);
                    if (p < 0.15) {
                        tx -= (0.15 - p) * scale * 0.5;
                        ty += (0.15 - p) * scale * 0.2;
                    }
                } else {
                    let p = (i - particleCount / 2) / (particleCount / 2);
                    tx = cx + (scale * 0.18);
                    ty = cy - (scale * 0.4) + (p * scale * 0.8);
                    if (p < 0.15) {
                        tx -= (0.15 - p) * scale * 0.5;
                        ty += (0.15 - p) * scale * 0.2;
                    }
                }

                tx += (Math.random() - 0.5) * 22;
                ty += (Math.random() - 0.5) * 22;

                targets11.push({ x: tx, y: ty });
            }
        }

        generate11Pattern();

        class Particle {
            constructor(index) {
                this.index = index;
                this.x = Math.random() * width;
                this.y = Math.random() * height;
                this.returnX = this.x;
                this.returnY = this.y;

                this.baseSize = Math.random() * 3 + 4; 
                this.size = this.baseSize;
                this.speedX = (Math.random() - 0.5) * 0.9;
                this.speedY = (Math.random() - 0.5) * 0.9;
                this.opacity = Math.random() * 0.4 + 0.2;
                this.escapeTimer = 0; 
            }

            update() {
                if (!isTimeFor11 && Date.now() - startTime > 4000) {
                    isTimeFor11 = true;
                    center11.classList.add('complete');
                }

                let mainTargetX, mainTargetY;
                if (isTimeFor11 && targets11[this.index]) {
                    mainTargetX = targets11[this.index].x;
                    mainTargetY = targets11[this.index].y;
                } else {
                    this.returnX += this.speedX;
                    this.returnY += this.speedY;

                    if (this.returnX < 0 || this.returnX > width) this.speedX *= -1;
                    if (this.returnY < 0 || this.returnY > height) this.speedY *= -1;
                    
                    mainTargetX = this.returnX;
                    mainTargetY = this.returnY;
                }

                // الگوریتم فرار بهینه‌سازی شده و فوق‌العاده سریع بدون ایجاد لگ
                if (mouse.active) {
                    const dx = this.x - mouse.x;
                    const dy = this.y - mouse.y;
                    const distance = Math.sqrt(dx * dx + dy * dy);

                    if (distance < mouse.radius) {
                        const force = (mouse.radius - distance) / mouse.radius;
                        this.x += (dx / (distance || 1)) * force * 14;
                        this.y += (dy / (distance || 1)) * force * 14;
                        this.size = this.baseSize + (force * 2.5);
                        this.escapeTimer = 240; // بازگشت در عرض ۴ ثانیه (60 * 4)
                    }
                }

                // بازگشت نرم و بدون باگ
                if (this.escapeTimer > 0) {
                    this.escapeTimer--;
                    this.x += (mainTargetX - this.x) * 0.025;
                    this.y += (mainTargetY - this.y) * 0.025;
                    if (this.size > this.baseSize) this.size -= 0.04;
                } else {
                    this.x += (mainTargetX - this.x) * 0.05;
                    this.y += (mainTargetY - this.y) * 0.05;
                    this.size = this.baseSize;
                }

                if (isTimeFor11 && this.opacity < 0.75) {
                    this.opacity += 0.01;
                }
            }

            draw() {
                ctx.fillStyle = `rgba(255, 255, 255, ${this.opacity})`;
                ctx.font = `bold ${this.size}px sans-serif`;
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.fillText('11', this.x, this.y);
            }
        }

        for (let i = 0; i < particleCount; i++) {
            particles.push(new Particle(i));
        }

        // پخش خودکار سر ۳ ثانیه به محض باز شدن سایت
        setTimeout(() => {
            bgMusic.play().catch(e => {
                console.log("مرورگر پخش خودکار را محدود کرد. منتظر اولین لمس...");
                const unlock = () => {
                    bgMusic.play();
                    window.removeEventListener('touchstart', unlock);
                    window.removeEventListener('mousemove', unlock);
                };
                window.addEventListener('touchstart', unlock);
                window.addEventListener('mousemove', unlock);
            });
        }, 3000);

        function animate() {
            ctx.clearRect(0, 0, width, height);
            
            // بهینه‌سازی پیشرفته لوپ خطوط: فقط ۱ خط در میان پردازش می‌شود تا دستگاه هنگ نکند
            for (let i = 0; i < particles.length; i++) {
                particles[i].update();
                particles[i].draw();

                const step = isTimeFor11 ? 3 : 2; // کاهش بار پردازشی خطوط در زمان‌های شلوغ
                for (let j = i + 1; j < particles.length; j += step) {
                    const dx = particles[i].x - particles[j].x;
                    const dy = particles[i].y - particles[j].y;
                    
                    // بررسی سریع فاصله قبل از محاسبات سنگین رادیکال
                    if (Math.abs(dx) < 35 && Math.abs(dy) < 35) {
                        const dist = Math.sqrt(dx * dx + dy * dy);
                        if (dist < 35) {
                            ctx.strokeStyle = `rgba(255, 255, 255, ${(1 - dist / 35) * 0.08})`;
                            ctx.lineWidth = 0.3;
                            ctx.beginPath();
                            ctx.moveTo(particles[i].x, particles[i].y);
                            ctx.lineTo(particles[j].x, particles[j].y);
                            ctx.stroke();
                        }
                    }
                }
            }

            requestAnimationFrame(animate);
        }

        const startAction = (e) => {
            mouse.active = true;
            const point = e.touches ? e.touches[0] : e;
            mouse.x = point.clientX;
            mouse.y = point.clientY;
        };

        const moveAction = (e) => {
            if (!mouse.active) return;
            const point = e.touches ? e.touches[0] : e;
            mouse.x = point.clientX;
            mouse.y = point.clientY;
        };

        const endAction = () => {
            mouse.active = false;
        };

        window.addEventListener('mousedown', startAction);
        window.addEventListener('mousemove', moveAction, { passive: true });
        window.addEventListener('mouseup', endAction);

        window.addEventListener('touchstart', startAction);
        window.addEventListener('touchmove', moveAction, { passive: true });
        window.addEventListener('touchend', endAction);

        animate();
    </script>
</body>
</html>
