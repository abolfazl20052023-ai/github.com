<!DOCTYPE html>
<html lang="fa">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Core Project</title>
    <style>
        * {
            box-sizing: border-box;
            user-select: none;
        }
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #05070b;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
        }
        .container {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            z-index: 2;
            pointer-events: none;
        }
        .main-number {
            font-size: 120px;
            font-weight: bold;
            color: rgba(255, 255, 255, 0.45);
            letter-spacing: 10px;
            text-shadow: 0 0 20px rgba(255, 255, 255, 0.2);
            transition: color 0.5s ease, text-shadow 0.5s ease;
        }
        .main-number.complete {
            color: rgba(255, 255, 255, 0.95);
            text-shadow: 0 0 35px rgba(255, 255, 255, 0.8);
        }
        .text-container {
            margin-top: 20px;
        }
        .text-en {
            font-size: 12px;
            color: rgba(255, 255, 255, 0.5);
            letter-spacing: 4px;
            text-transform: uppercase;
            margin-bottom: 8px;
        }
        .text-fa {
            font-size: 13px;
            color: rgba(255, 255, 255, 0.5);
            letter-spacing: 1px;
            font-weight: 300;
            opacity: 0.8;
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="main-number" id="center11">11</div>
        <div class="text-container">
            <div class="text-en">Touch to connect the stars</div>
            <div class="text-fa">لمس کنید تا ستاره‌ها به هم متصل شوند</div>
        </div>
    </div>

    <audio id="bgMusic" src="music.mp3" preload="auto"></audio>

    <script>
        const canvas = document.getElementById('spaceCanvas');
        const ctx = canvas.getContext('2d');
        const center11 = document.getElementById('center11');
        const bgMusic = document.getElementById('bgMusic');

        let width = canvas.width = window.innerWidth;
        let height = canvas.height = window.innerHeight;

        window.addEventListener('resize', () => {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
        });

        const mouse = { x: null, y: null, active: false, radius: 120 };
        const particleCount = 450; 
        const particles = [];

        class Particle {
            constructor() {
                this.x = Math.random() * width;
                this.y = Math.random() * height;
                this.baseSize = 6;
                this.size = this.baseSize;
                this.speedX = (Math.random() - 0.5) * 0.4;
                this.speedY = (Math.random() - 0.5) * 0.4;
                this.opacity = Math.random() * 0.4 + 0.2;
            }

            update() {
                this.x += this.speedX;
                this.y += this.speedY;

                if (this.x < 0 || this.x > width) this.speedX *= -1;
                if (this.y < 0 || this.y > height) this.speedY *= -1;

                if (mouse.active) {
                    const dx = mouse.x - this.x;
                    const dy = mouse.y - this.y;
                    const distance = Math.sqrt(dx * dx + dy * dy);

                    if (distance < mouse.radius) {
                        const force = (mouse.radius - distance) / mouse.radius;
                        this.x += (dx / distance) * force * 4;
                        this.y += (dy / distance) * force * 4;
                        this.size = this.baseSize + (force * 14);
                        if(this.opacity < 0.9) this.opacity += 0.05;
                    } else {
                        if (this.size > this.baseSize) this.size -= 0.3;
                        if (this.opacity > 0.4) this.opacity -= 0.01;
                    }
                } else {
                    if (this.size > this.baseSize) this.size -= 0.3;
                }
            }

            draw() {
                ctx.fillStyle = `rgba(255, 255, 255, ${this.opacity})`;
                ctx.font = `bold ${this.size}px sans-serif`;
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.fillText('11', this.x, this.y);
            }
        }

        for (let i = 0; i < particleCount; i++) {
            particles.push(new Particle());
        }

        let connectionCount = 0;
        let isMusicPlaying = false;
        let hasInteracted = false;

        // تابع شروع تایمر ۳ ثانیه‌ای برای پخش موزیک
        function startMusicTimer() {
            if (!hasInteracted) {
                hasInteracted = true;
                
                // افکت پررنگ شدن عدد ۱۱ وسط بعد از ۳ ثانیه همزمان با پخش آهنگ
                setTimeout(() => {
                    if (!isMusicPlaying) {
                        bgMusic.play()
                            .then(() => {
                                isMusicPlaying = true;
                                center11.classList.add('complete'); // روشن شدن عدد ۱۱ همزمان با موزیک
                            })
                            .catch(e => console.log("خطای پخش:", e));
                    }
                }, 3000); // ۳۰۰۰ میلی‌ثانیه یعنی ۳ ثانیه
            }
        }

        function checkCompletion() {
            if (mouse.active) {
                const centerX = width / 2;
                const centerY = height / 2;
                const dx = mouse.x - centerX;
                const dy = mouse.y - centerY;
                const distToCenter = Math.sqrt(dx * dx + dy * dy);

                if (distToCenter < 130) {
                    connectionCount += 1.5;
                    if (connectionCount > 100) {
                        connectionCount = 100;
                        if (!isMusicPlaying && !hasInteracted) {
                            // اگر کاربر خودش سریع رفت روی ۱۱، آهنگ فوری پخش شود
                            center11.classList.add('complete');
                            bgMusic.play().then(() => { isMusicPlaying = true; }).catch(e => console.log(e));
                        }
                    }
                }
            } else {
                if (connectionCount > 0) connectionCount -= 1;
                if (connectionCount < 100 && !isMusicPlaying) {
                    center11.classList.remove('complete');
                }
            }
        }
