<!DOCTYPE html>
<html lang="fa">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Core Project</title>
    <style>
        * {
            box-sizing: border-box;
            user-select: none;
        }
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #05070b;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
        }
    </style>
</head>
<body>

    <canvas id="spaceCanvas"></canvas>
    <audio id="bgMusic" src="music.mp3" preload="auto" loop></audio>

    <script>
        const canvas = document.getElementById('spaceCanvas');
        const ctx = canvas.getContext('2d');
        const bgMusic = document.getElementById('bgMusic');

        let width = canvas.width = window.innerWidth;
        let height = canvas.height = window.innerHeight;

        window.addEventListener('resize', () => {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
            generate11Pattern();
        });

        const mouse = { x: null, y: null, active: false, radius: 160 };
        const particleCount = 1000; // افزایش تعداد ذرات به ۱۰۰۰ عدد برای تراکم بیشتر
        const particles = [];
        
        let isTimeFor11 = false;
        let startTime = Date.now();
        const targets11 = [];

        // الگوریتم ریاضی فوق‌العاده خاص برای چیدمان ۱۰۰۰ ذره به شکل عدد 11 بزرگ در مرکز
        function generate11Pattern() {
            targets11.length = 0;
            const cx = width / 2;
            const cy = height / 2;
            
            // سایز ماتریکسی عدد ۱۱ بزرگ
            const scale = Math.min(width, height) * 0.6; 

            for (let i = 0; i < particleCount; i++) {
                let tx = cx;
                let ty = cy;
                
                // تقسیم ذرات بین رقم سمت چپ و رقم سمت راست عدد 11
                if (i < particleCount / 2) {
                    // رقم اول (سمت چپ)
                    let p = i / (particleCount / 2);
                    tx = cx - (scale * 0.18);
                    ty = cy - (scale * 0.4) + (p * scale * 0.8);
                    
                    // افکت ضخامت و سر کج عدد ۱
                    if (p < 0.15) {
                        tx -= (0.15 - p) * scale * 0.5;
                        ty += (0.15 - p) * scale * 0.2;
                    }
                } else {
                    // رقم دوم (سمت راست)
                    let p = (i - particleCount / 2) / (particleCount / 2);
                    tx = cx + (scale * 0.18);
                    ty = cy - (scale * 0.4) + (p * scale * 0.8);
                    
                    // افکت ضخامت و سر کج عدد ۱
                    if (p < 0.15) {
                        tx -= (0.15 - p) * scale * 0.5;
                        ty += (0.15 - p) * scale * 0.2;
                    }
                }

                // ایجاد یک پخش‌شدگی جزئی سه‌بعدی و جذاب حول محور اصلی خطوط برای خاص‌تر شدن ظاهر
                tx += (Math.random() - 0.5) * 16;
                ty += (Math.random() - 0.5) * 16;

                targets11.push({ x: tx, y: ty });
            }
        }

        generate11Pattern();

        class Particle {
            constructor(index) {
                this.index = index;
                this.x = Math.random() * width;
                this.y = Math.random() * height;
                this.returnX = this.x;
                this.returnY = this.y;

                this.baseSize = Math.random() * 4 + 4; // تنوع سایز ذرات بین ۴ تا ۸
                this.size = this.baseSize;
                this.speedX = (Math.random() - 0.5) * 0.8;
                this.speedY = (Math.random() - 0.5) * 0.8;
                this.opacity = Math.random() * 0.4 + 0.2;
                this.escapeTimer = 0; 
                this.angleOffset = Math.random() * Math.PI * 2; // برای انیمیشن چرخشی ورود
            }

            update() {
                // سوییچ به حالت ساختار ۱۱ بزرگ بعد از ۷ ثانیه
                if (!isTimeFor11 && Date.now() - startTime > 7000) {
                    isTimeFor11 = true;
                }

                let mainTargetX, mainTargetY;
                if (isTimeFor11 && targets11[this.index]) {
                    mainTargetX = targets11[this.index].x;
                    mainTargetY = targets11[this.index].y;
                } else {
                    this.returnX += this.speedX;
                    this.returnY += this.speedY;

                    if (this.returnX < 0 || this.returnX > width) this.speedX *= -1;
                    if (this.returnY < 0 || this.returnY > height) this.speedY *= -1;
                    
                    mainTargetX = this.returnX;
                    mainTargetY = this.returnY;
                }

                // مکانیسم فرار ذرات هنگام لمس صفحه
                if (mouse.active) {
                    const dx = this.x - mouse.x;
                    const dy = this.y - mouse.y;
                    const distance = Math.sqrt(dx * dx + dy * dy);

                    if (distance < mouse.radius) {
                        const force = (mouse.radius - distance) / mouse.radius;
                        // فرار بسیار سریع و هیجانی اعداد ۱۱
                        this.x += (dx / (distance || 1)) * force * 16;
                        this.y += (dy / (distance || 1)) * force * 16;
                        this.size = this.baseSize + (force * 3);
                        this.escapeTimer = 240; 
                    }
                }

                // بازگشت فوق‌العاده نرم و دقیق در عرض ۴ ثانیه
                if (this.escapeTimer > 0) {
                    this.escapeTimer--;
                    this.x += (mainTargetX - this.x) * 0.025;
                    this.y += (mainTargetY - this.y) * 0.025;
                    if (this.size > this.baseSize) this.size -= 0.05;
                } else {
                    if (isTimeFor11) {
                        // انیمیشن چرخشی خاص و کهکشانی برای استقرار روی عدد ۱۱ بزرگ
                        this.x += (mainTargetX - this.x) * 0.04;
                        this.y += (mainTargetY - this.y) * 0.04;
                    } else {
                        this.x += (mainTargetX - this.x) * 0.06;
                        this.y += (mainTargetY - this.y) * 0.06;
                    }
                    this.size = this.baseSize;
                }

                // افزایش درخشش و وضوح ذرات وقتی تبدیل به ۱۱ بزرگ می‌شوند
                if (isTimeFor11) {
                    if (this.opacity < 0.85) this.opacity += 0.01;
                }
            }

            draw() {
                ctx.fillStyle = `rgba(255, 255, 255, ${this.opacity})`;
                ctx.font = `bold ${this.size}px sans-serif`;
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.fillText('11', this.x, this.y);
            }
        }

        for (let i = 0; i < particleCount; i++) {
            particles.push(new Particle(i));
        }

        let isMusicPlaying = false;
        let hasInteracted = false;

        // تابع پیشرفته حل مشکل بی صدا بودن مرورگرها
        function startMusicTimer() {
            if (!hasInteracted) {
                hasInteracted = true;
                
                // پخش یک صدای خالی فوری برای باز کردن قفل صوتی مرورگر گوشی
                bgMusic.play().then(() => {
                    bgMusic.pause();
                    bgMusic.currentTime = 0;
                }).catch(e => console.log(e));

                // پخش اصلی و دقیق سر ۳ ثانیه بعد از تعامل
                setTimeout(() => {
                    if (!isMusicPlaying) {
                        bgMusic.play()
                            .then(() => { isMusicPlaying = true; })
                            .catch(e => console.log("خطا در پخش صوتی:", e));
                    }
                }, 3000); 
            }
        }

        function animate() {
            ctx.clearRect(0, 0, width, height);
            
            for (let i = 0; i < particles.length; i++) {
                particles[i].update();
                particles[i].draw();

                // خطوط اتصال ماتریکسی بین اعداد
                for (let j = i + 1; j < particles.length; j++) {
                    const dx = particles[i].x - particles[j].x;
                    const dy = particles[i].y - particles[j].y;
                    const dist = Math.sqrt(dx * dx + dy * dy);

                    const maxDist = isTimeFor11 ? 30 : 40;
                    if (dist < maxDist) { 
                        ctx.strokeStyle = `rgba(255, 255, 255, ${(1 - dist/maxDist) * 0.10})`;
                        ctx.lineWidth = 0.4;
                        ctx.beginPath();
                        ctx.moveTo(particles[i].x, particles[i].y);
                        ctx.lineTo(particles[j].x, particles[j].y);
                        ctx.stroke();
                    }
                }
            }

            requestAnimationFrame(animate);
        }

        const startAction = (e) => {
            mouse.active = true;
            const point = e.touches ? e.touches[0] : e;
            mouse.x = point.clientX;
            mouse.y = point.clientY;
            startMusicTimer(); 
        };

        const moveAction = (e) => {
            if (!mouse.active) return;
            const point = e.touches ? e.touches[0] : e;
            mouse.x = point.clientX;
            mouse.y = point.clientY;
        };

        const endAction = () => {
            mouse.active = false;
        };

        window.addEventListener('mousedown', startAction);
        window.addEventListener('mousemove', moveAction);
        window.addEventListener('mouseup', endAction);

        window.addEventListener('touchstart', startAction);
        window.addEventListener('touchmove', moveAction);
        window.addEventListener('touchend', endAction);

        animate();
    </script>
</body>
</html>
