<!DOCTYPE html>
<html lang="fa">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Core Project</title>
    <style>
        * {
            box-sizing: border-box;
            user-select: none;
        }
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #05070b;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
        }
        .container {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            z-index: 2;
            pointer-events: none;
        }
        .main-number {
            font-size: 120px;
            font-weight: bold;
            color: rgba(255, 255, 255, 0.45);
            letter-spacing: 10px;
            text-shadow: 0 0 20px rgba(255, 255, 255, 0.2);
            transition: color 0.5s ease, text-shadow 0.5s ease;
        }
        .main-number.complete {
            color: rgba(255, 255, 255, 0.95);
            text-shadow: 0 0 35px rgba(255, 255, 255, 0.8);
        }
    </style>
</head>
<body>

    <canvas id="spaceCanvas"></canvas>

    <div class="container">
        <div class="main-number" id="center11">11</div>
    </div>

    <audio id="bgMusic" src="music.mp3" preload="auto"></audio>

    <script>
        const canvas = document.getElementById('spaceCanvas');
        const ctx = canvas.getContext('2d');
        const center11 = document.getElementById('center11');
        const bgMusic = document.getElementById('bgMusic');

        let width = canvas.width = window.innerWidth;
        let height = canvas.height = window.innerHeight;

        window.addEventListener('resize', () => {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
            generateFacePattern();
        });

        const mouse = { x: null, y: null, active: false, radius: 150 };
        const particleCount = 450; 
        const particles = [];
        
        let isTimeForFace = false;
        let startTime = Date.now();
        const faceTargets = [];

        function generateFacePattern() {
            faceTargets.length = 0;
            const cx = width / 2;
            const cy = height / 2 - 20;

            for (let i = 0; i < particleCount; i++) {
                let t = i / particleCount;
                let tx = 0, ty = 0;

                if (t < 0.15) { 
                    let angle = (t / 0.15) * Math.PI * 1.2 - 0.4;
                    tx = cx + Math.cos(angle) * 140 - (t * 50);
                    ty = cy + Math.sin(angle) * 180 - 40;
                } else if (t < 0.30) { 
                    let p = (t - 0.15) / 0.15;
                    tx = cx + 90 + (p * 60);
                    ty = cy - 30 + (p * 220);
                } else if (t < 0.45) { 
                    let p = (t - 0.30) / 0.15;
                    tx = cx - 65 + (p * 40);
                    ty = cy - 15 + Math.sin(p * Math.PI) * 12 + (p * 5);
                } else if (t < 0.60) { 
                    let p = (t - 0.45) / 0.15;
                    tx = cx + 15 + (p * 45);
                    ty = cy - 35 + Math.sin(p * Math.PI) * 10 - (p * 2);
                } else if (t < 0.75) { 
                    let p = (t - 0.60) / 0.15;
                    tx = cx - 35 + (p * 65);
                    ty = cy + 45 + Math.sin(p * Math.PI) * 14 + (p * 8);
                } else if (t < 0.90) { 
                    let p = (t - 0.75) / 0.15;
                    tx = cx - 90 + (p * 140);
                    ty = cy + 20 + (p * 90);
                } else { 
                    let p = (t - 0.90) / 0.10;
                    tx = cx - 110 + Math.sin(p * Math.PI * 1.5) * 25 - (p * 15);
                    ty = cy - 40 + (p * 120);
                }

                faceTargets.push({ x: tx, y: ty });
            }
        }

        generateFacePattern();

        class Particle {
            constructor(index) {
                this.index = index;
                this.x = Math.random() * width;
                this.y = Math.random() * height;
                
                // ذخیره موقعیت قبل از فرار برای بازگشت دقیق
                this.returnX = this.x;
                this.returnY = this.y;

                this.baseSize = 6;
                this.size = this.baseSize;
                this.speedX = (Math.random() - 0.5) * 0.5;
                this.speedY = (Math.random() - 0.5) * 0.5;
                this.opacity = Math.random() * 0.4 + 0.2;
                this.escapeTimer = 0; // تایمر برای کنترل زمان بازگشت ۴ ثانیه‌ای
            }

            update() {
                // تغییر زمان به ۷ ثانیه (۷۰۰۰ میلی‌ثانیه)
                if (!isTimeForFace && Date.now() - startTime > 7000) {
                    isTimeForFace = true;
                }

                // تعیین موقعیت اصلی که ذره باید در آن قرار بگیرد
                let mainTargetX, mainTargetY;
                if (isTimeForFace && faceTargets[this.index]) {
                    mainTargetX = faceTargets[this.index].x;
                    mainTargetY = faceTargets[this.index].y;
                } else {
                    this.returnX += this.speedX;
                    this.returnY += this.speedY;

                    if (this.returnX < 0 || this.returnX > width) this.speedX *= -1;
                    if (this.returnY < 0 || this.returnY > height) this.speedY *= -1;
                    
                    mainTargetX = this.returnX;
                    mainTargetY = this.returnY;
                }

                // بررسی تعامل لمس و افکت فرار کردن اعداد
                if (mouse.active) {
                    const dx = this.x - mouse.x;
                    const dy = this.y - mouse.y;
                    const distance = Math.sqrt(dx * dx + dy * dy);

                    if (distance < mouse.radius) {
                        // ایجاد نیروی فرار به سمت بیرون از موقعیت انگشت
                        const force = (mouse.radius - distance) / mouse.radius;
                        this.x += (dx / (distance || 1)) * force * 12;
                        this.y += (dy / (distance || 1)) * force * 12;
                        this.size = this.baseSize + (force * 5);
                        this.escapeTimer = 240; // تنظیم فریم‌ها برای بازگشت ۴ ثانیه‌ای (۶۰ فریم در ثانیه * ۴ = ۲۴۰)
                    }
                }

                // بازگشت نرم به حالت اول دقیقاً در عرض ۴ ثانیه بعد از رها کردن لمس
                if (this.escapeTimer > 0) {
                    this.escapeTimer--;
                    // سرعت بازگشت ملایم (دقیقاً ۴ ثانیه طول می‌کشد تا کاملاً سر جایش بنشیند)
                    this.x += (mainTargetX - this.x) * 0.025;
                    this.y += (mainTargetY - this.y) * 0.025;
                    if (this.size > this.baseSize) this.size -= 0.05;
                } else {
                    // حرکت یا استقرار عادی
                    this.x += (mainTargetX - this.x) * 0.05;
                    this.y += (mainTargetY - this.y) * 0.05;
                    this.size = this.baseSize;
                }

                // تنظیم شفافیت متناسب با وضعیت چهره
                if (isTimeForFace) {
                    if (this.opacity < 0.7) this.opacity += 0.02;
                }
            }

            draw() {
                ctx.fillStyle = `rgba(255, 255, 255, ${this.opacity})`;
                ctx.font = `bold ${this.size}px sans-serif`;
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.fillText('11', this.x, this.y);
            }
        }

        for (let i = 0; i < particleCount; i++) {
            particles.push(new Particle(i));
        }

        let connectionCount = 0;
        let isMusicPlaying = false;
        let hasInteracted = false;

        function startMusicTimer() {
            if (!hasInteracted) {
                hasInteracted = true;
                setTimeout(() => {
                    if (!isMusicPlaying) {
                        bgMusic.play()
                            .then(() => {
                                isMusicPlaying = true;
                                center11.classList.add('complete');
                            })
                            .catch(e => console.log("خطای صوتی:", e));
                    }
                }, 3000); 
            }
        }

        function checkCompletion() {
            if (mouse.active) {
                const centerX = width / 2;
                const centerY = height / 2;
                const dx = mouse.x - centerX;
                const dy = mouse.y - centerY;
                const distToCenter = Math.sqrt(dx * dx + dy * dy);

                if (distToCenter < 130) {
                    connectionCount += 1.5;
                    if (connectionCount > 100) {
                        connectionCount = 100;
                        if (!isMusicPlaying && !hasInteracted) {
                            center11.classList.add('complete');
                            bgMusic.play().then(() => { isMusicPlaying = true; }).catch(e => console.log(e));
                        }
                    }
                }
            } else {
                if (connectionCount > 0) connectionCount -= 1;
                if (connectionCount < 100 && !isMusicPlaying) {
                    center11.classList.remove('complete');
                }
            }
        }

        function animate() {
            ctx.clearRect(0, 0, width, height);
            
            for (let i = 0; i < particles.length; i++) {
                particles[i].update();
                particles[i].draw();

                for (let j = i + 1; j < particles.length; j++) {
                    const dx = particles[i].x - particles[j].x;
                    const dy = particles[i].y - particles[j].y;
                    const dist = Math.sqrt(dx * dx + dy * dy);

                    const maxDist = isTimeForFace ? 35 : 45;
                    if (dist < maxDist) { 
                        ctx.strokeStyle = `rgba(255, 255, 255, ${(1 - dist/maxDist) * 0.12})`;
                        ctx.lineWidth = 0.5;
                        ctx.beginPath();
                        ctx.moveTo(particles[i].x, particles[i].y);
                        ctx.lineTo(particles[j].x, particles[j].y);
                        ctx.stroke();
                    }
                }
            }

            checkCompletion();
            requestAnimationFrame(animate);
        }

        const startAction = (e) => {
            mouse.active = true;
            const point = e.touches ? e.touches[0] : e;
            mouse.x = point.clientX;
            mouse.y = point.clientY;
            startMusicTimer(); 
        };

        const moveAction = (e) => {
            if (!mouse.active) return;
            const point = e.touches ? e.touches[0] : e;
            mouse.x = point.clientX;
            mouse.y = point.clientY;
        };

        const endAction = () => {
            mouse.active = false;
        };

        window.addEventListener('mousedown', startAction);
        window.addEventListener('mousemove', moveAction);
        window.addEventListener('mouseup', endAction);

        window.addEventListener('touchstart', startAction);
        window.addEventListener('touchmove', moveAction);
        window.addEventListener('touchend', endAction);

        animate();
    </script>
</body>
</html>
